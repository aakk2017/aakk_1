<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.gameTitle">青云谱 - 升级 - 对局</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="static/css/tokens.css">
    <link rel="stylesheet" href="static/css/card.css">
    <link rel="stylesheet" href="static/css/widgets.css">
    <link rel="stylesheet" href="static/css/recap.css">
    <link rel="stylesheet" href="static/css/game.css">
</head>
<body>
    <div class="container">
        <div class="nscontainer" id="game-top-row">
            <div class="corner" id="corner-lt">
                <div id="div-seats" class="blocks-lt" pivot="undetermined">
                    <div id="div-table-number"></div>
                    <div class="div-pivot-mark" data-i18n="labels.pivotMark">庄</div>
                </div>
                <div id="div-denomination-area" class="blocks-lt">
                    <div id="div-denomination">
                        <div id="div-denomination-level"></div>
                        <div id="div-denomination-strain"></div>
                    </div>
                    <div id="div-declaration">
                        <span id="span-declare-method"></span>
                        <span id="span-declaration"></span>
                    </div>
                </div>
            </div>
            <div class="nshand" id="game-top-info">
                <div id="declare-matrix" style="display:none">
                    <div class="declare-row">
                        <button class="declare-btn" id="declare-btn-s0" data-suit="0"></button>
                        <button class="declare-btn" id="declare-btn-s1" data-suit="1"></button>
                        <button class="declare-btn" id="declare-btn-s2" data-suit="2"></button>
                        <button class="declare-btn" id="declare-btn-s3" data-suit="3"></button>
                        <button class="declare-btn" id="declare-btn-s4" data-suit="4"></button>
                    </div>
                    <div class="declare-row">
                        <button class="declare-btn" id="declare-btn-d0" data-suit="0"></button>
                        <button class="declare-btn" id="declare-btn-d1" data-suit="1"></button>
                        <button class="declare-btn" id="declare-btn-d2" data-suit="2"></button>
                        <button class="declare-btn" id="declare-btn-d3" data-suit="3"></button>
                        <button class="declare-btn" id="declare-btn-d4" data-suit="4"></button>
                    </div>
                </div>
            </div>
            <div class="corner" id="corner-rt">
                <div id="div-score-area" class="blocks-rt">
                    <div id="div-score-container">
                        <div id="div-score">0</div>
                        <div id="counter-drawer"><div id="counter-drawer-inner"></div></div>
                    </div>
                    <div id="div-mp-compensation-and-base">
                        <div id="div-mp-compensation"></div>
                        <div id="div-base-score"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="game-desk-container">
            <div id="desk-north"  class="desk-slot"></div>
            <div id="desk-west"   class="desk-slot"></div>
            <div id="desk-center" class="desk-center"><div id="desk-center-info"></div></div>
            <div id="desk-east"   class="desk-slot"></div>
            <div id="desk-south"  class="desk-slot"></div>
        </div>
        <div class="nscontainer" id="shand-row">
            <div class="corner" id="corner-lb">
                <div id="game-actions">
                    <button class="button game-btn" id="btn-new-game" data-i18n="buttons.newGame">新对局</button>
                    <button class="button game-btn" id="btn-play" disabled data-i18n="buttons.play">出牌</button>
                    <div id="fc-mode-selector" style="display:none;">
                        <label><input type="radio" name="fc-mode" value="must-play" checked> <span data-i18n="fc.mustPlay">必出</span></label>
                        <label><input type="radio" name="fc-mode" value="must-hold"> <span data-i18n="fc.mustHold">必留</span></label>
                    </div>
                </div>
                <div id="game-phase-info"></div>
                <button id="btn-show-base" data-i18n="buttons.showBase">查看底牌</button>
                <div id="base-preview"></div>
            </div>
            <div class="nshand" id="shand"></div>
            <div class="corner" id="corner-rb">
                <div id="game-log"></div>
            </div>
        </div>
        <div class="footer">
            <menu class="menubar">
                <li><button class="footer-link-btn" id="btn-goto-recap" data-i18n="buttons.gotoRecap">&#8617; 牌谱</button></li>
                <li><button class="footer-link-btn" id="btn-toggle-test" data-i18n="buttons.testModeOff" onclick="toggleTestMode()">测试模式: 关</button></li>
            </menu>
            <div id="statusbar">
                <div id="errorbar"></div>
                <span data-i18n="status.ready">准备开始</span>
            </div>
        </div>
    </div>

    <!-- Counting-phase dialog (§7) -->
    <div id="counting-overlay"></div>
    <div id="counting-dialog">
        <div id="counting-dialog-inner">
            <div class="cd-cell" id="cd-base"><div id="cd-base-label">底牌</div></div>
            <div class="cd-cell" id="cd-score"></div>
            <div class="cd-cell" id="cd-result"><div id="cd-result-name"></div><div id="cd-result-levels"></div></div>
            <div class="cd-cell" id="cd-buttons">
                <button class="button" id="cd-btn-ready" data-i18n="buttons.ready">准备</button>
                <button class="button" id="cd-btn-leave" data-i18n="buttons.leave">离开</button>
            </div>
        </div>
    </div>

    <!-- i18n -->
    <script src="static/js/i18n/zh-CN.js"></script>
    <script src="static/js/i18n/en.js"></script>
    <script src="static/js/i18n/index.js"></script>

    <!-- Shared core -->
    <script src="static/js/core/cards.js"></script>
    <script src="static/js/games/shengji/shengji_types.js"></script>
    <script src="static/js/games/shengji/shengji_cards.js"></script>

    <!-- Game engine & bot -->
    <script src="static/js/games/shengji/shengji_engine.js"></script>
    <script src="static/js/games/shengji/shengji_bot.js"></script>

    <!-- Page entry -->
    <script src="static/js/pages/game/index.js"></script>
    <script>document.addEventListener('DOMContentLoaded', applyI18n);</script>
</body>
</html>
