<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.recapTitle">青云谱 - 升级</title>

    <!-- Fonts -->
    <!-- Roboto Mono, for 10 -->
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet"> -->
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="static/css/tokens.css">
    <link rel="stylesheet" href="static/css/card.css">
    <link rel="stylesheet" href="static/css/widgets.css">
    <link rel="stylesheet" href="static/css/recap.css">
</head>
<body>
    <div class="container">
        <div class="nscontainer">
            <div class="corner" id="corner-lt">
                <div id="div-seats" class="blocks-lt" pivot="undetermined">
                    <div id="div-table-number"></div>
                    <div class="div-pivot-mark" data-i18n="labels.pivotMark">庄</div>
                </div>
                <div id="div-denomination-area" class="blocks-lt">
                    <div id="div-denomination">
                        <div id="div-denomination-level"></div>
                        <div id="div-denomination-strain"></div>
                    </div>
                    <div id="div-declaration"><span id="span-declare-method"></span><span id="span-declaration"></span></div>
                </div>
            </div>
            <div class="nshand" id="nhand"></div>
            <div class="corner" id="corner-rt">
                <div id="div-score-area" class="blocks-rt">
                    <div id="div-score-container"><div id="div-score"></div></div>
                    <div id="div-hints">
                        <div id="div-hint-1"></div>
                        <div id="div-hint-2"></div>
                    </div>
                </div>
                <div id="div-captured-counters" class="blocks-rt"></div>
            </div>
        </div>
        <div class="middle-container">
            <div class="ewhand" id="whand"></div>
            <div class="desk">
                <div class="table-record-container" id="table-record-container" area-show="show">
                    <table id="table-record">
                        <thead>
                            <div class="base-div-in-table"></div>
                            <tr>
                                <th></th>
                                <th data-i18n="table.pivot">庄</th>
                                <th data-i18n="table.successor">右</th>
                                <th data-i18n="table.ally">前</th>
                                <th data-i18n="table.predecessor">左</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div class="ewhand" id="ehand"></div>
        </div>
        <div class="nscontainer">
            <div class="corner" id="corner-lb">
                <button class="button" id="btn-goto-game" style="display:block; text-align:center; width:100%; margin-bottom:0.4vh; cursor:pointer;" data-i18n="buttons.gotoGame">开始对局</button>
                <div class="text ellipsis" id="file-name-container"></div>
                <div class="input-container">
                    <label for="open-file" class="button" data-i18n="buttons.openFile">选择牌谱(.upg)</label>
                    <input 
                        type="file" 
                        id="open-file" 
                        name="open-file" 
                        accept=".upg, .qyp, .qypc" 
                        onchange="if(typeof viewFile === 'function') viewFile()" />
                </div>
                <a class="button" id="save-upg-btn" href="#" download data-i18n="buttons.saveUpg">保存为.upg</a>
            </div>
            <div class="nshand" id="shand"></div>
            <div class="corner" id="corner-rb"></div>
        </div>
        <div class="footer">
            <menu class="menubar">
                <li id="menu-open"><div class="key">1</div><span data-i18n="menus.open">打开</span></li>
                <li id="menu-save"><div class="key">2</div><span data-i18n="menus.save">保存</span></li>
                <li id="menu-settings"><div class="key">3</div><span data-i18n="menus.settings">设置</span></li>
                <li id="menu-display"><div class="key">4</div><span data-i18n="menus.display">显示</span></li>
                <li id="menu-play"><div class="key">5</div><span data-i18n="menus.play">行牌</span></li>
                <li id="menu-edit"><div class="key">6</div><span data-i18n="menus.edit">打谱</span></li>
                <li id="menu-help"><div class="key">0</div><span data-i18n="menus.help">指南</span></li>
            </menu>
            <menu class="toolbar">
                <li id="button-to-start" title="" data-i18n-title="tooltips.toStart">&#8617;</li>
                <li id="button-previous-of-reference" title="" data-i18n-title="tooltips.previousOfReference">&#8810;</li>
                <li id="button-previous-move" title="" data-i18n-title="tooltips.previousMove">&lt;</li>
                <li id="button-next-move" title="" data-i18n-title="tooltips.nextMove">&gt;</li>
                <li id="button-next-of-reference" title="" data-i18n-title="tooltips.nextOfReference">&#8811;</li>
            </menu>
            <div id="statusbar">
                <div id="errorbar"></div>
                <span id="statustext" data-i18n="status.barDefault">状态栏</span>
            </div>
        </div>
        <div class="comment" id="comment" area-show="hide"></div>
        <div class="tree-record" id="tree-record" area-show="hide"></div>
    </div>
    
    <!-- i18n -->
    <script src="static/js/i18n/zh-CN.js"></script>
    <script src="static/js/i18n/en.js"></script>
    <script src="static/js/i18n/index.js"></script>

    <!-- Core Generic Replay Layer (Reusable) -->
    <script src="static/js/core/cards.js"></script>
    <script src="static/js/core/dom_refs.js"></script>
    <script src="static/js/core/replay_state.js"></script>
    <script src="static/js/core/recap_view.js"></script>
    
    <!-- Shengji-Specific Layer -->
    <script src="static/js/games/shengji/shengji_types.js"></script>
    <script src="static/js/games/shengji/shengji_cards.js"></script>
    
    <!-- Legacy bridge for old Shengji functions migrated into modular path -->
    <script src="static/js/games/shengji/shengji_legacy_bridge.js"></script>
    
    <!-- Generic Event System (loaded BEFORE view module so handlers are defined) -->
    <script src="static/js/core/events.js"></script>
    
    <!-- Shengji Modular Implementation -->
    <script src="static/js/games/shengji/shengji_recap_view.js"></script>
    <script src="static/js/games/shengji/shengji_game_controller.js"></script>
    <script src="static/js/games/shengji/shengji_recap_parser.js"></script>
    
    <!-- Page Entry Point (Orchestrator) -->
    <script src="static/js/pages/recap/index.js"></script>
    <script>document.addEventListener('DOMContentLoaded', applyI18n);</script>
</body>
</html>
